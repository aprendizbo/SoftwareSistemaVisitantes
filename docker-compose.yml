version: '3.8'

services:
  db:
    image: postgres:16
    container_name: sistemavisitantes-db
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=sistemavisitantes
      - POSTGRES_USER=sistemavisitantes
      - POSTGRES_PASSWORD=SV_Boccherini_2026
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sistemavisitantes"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: tu-registro/sistemavisitantes:latest   # ver opción A/B abajo
    container_name: sistemavisitantes-web          # ← nombre corregido
    restart: always
    depends_on:
      db:
        condition: service_healthy                 # espera a que postgres esté listo
    ports:
      - "8001:8000"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    environment:
      - DATABASE_URL=postgres://sistemavisitantes:SV_Boccherini_2026@db:5432/sistemavisitantes
      - DJANGO_SETTINGS_MODULE=tu_proyecto.settings.production
      - DEBUG=False
      - ALLOWED_HOSTS=ip-del-servidor,localhost

volumes:
  db_data:
  static_files:
  media_files:
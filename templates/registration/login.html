{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="card border-0 shadow-sm p-4 text-center" style="width: 100%; max-width: 420px; background-color: #ffffff; border-radius: 10px;">
        
        <div class="mb-4 bg-white py-2"ttps://bocch>
            <img src="https://boccherinicol.vtexassets.com/assets/vtex.file-manager-graphql/images/117104a7-a9bf-4a1c-ba2b-c33ac4db466e___dc9a4962633b58475c7995a25825a981.jpg" 
                 alt="Logo Boccherini" 
                 style="max-height: 65px; width: auto; object-fit: contain;">
            <hr class="text-muted opacity-25 mt-3">
        </div>

        <h5 class="fw-bold text-secondary mb-4">
            <i class="bi bi-shield-lock-fill text-primary"></i> Inicio de Sesión
        </h5>

        <form method="POST" class="text-start">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="alert alert-danger py-2 px-3 small rounded mb-3 text-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill"></i> Usuario o contraseña incorrectos.
                </div>
            {% endif %}

            <div class="mb-3">
                <label for="id_username" class="form-label text-muted small fw-bold text-uppercase">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" id="id_username" class="form-control border-start-0 bg-light" placeholder="Ej. administrador" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="id_password" class="form-label text-muted small fw-bold text-uppercase">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" id="id_password" class="form-control border-start-0 bg-light" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                <i class="bi bi-box-arrow-in-right"></i> Ingresar al Sistema
            </button>
        </form>

    </div>
</div>
{% endblock %}
